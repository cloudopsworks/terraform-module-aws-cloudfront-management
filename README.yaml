description: |-
  Expertly manages AWS CloudFront distributions, including complex origin configurations (S3 and custom), cache behaviors, CloudFront functions, and staging environments for continuous deployment.

# Introduction to the project
introduction: |-
  This Terraform module provides a professional and comprehensive way to manage AWS CloudFront distributions. It supports a wide range of configurations, including multiple origins with Origin Access Control (OAC), sophisticated cache behaviors using managed or custom policies, and CloudFront functions for edge computing. A key feature is its support for continuous deployment through staging distributions, allowing for safe testing of configuration changes using either header-based or weight-based traffic routing.

# How to use this project
usage: |-
  ### Terragrunt Configuration

  To use this module with Terragrunt, create a `terragrunt.hcl` file with the following structure:

  ```hcl
  include "root" {
    path = find_in_parent_folders()
  }

  terraform {
    source = "github.com/cloudopsworks/terraform-module-aws-cloudfront-management?ref=v1.0.0"
  }

  inputs = {
    # (Optional) The name of the CloudFront distribution. If not provided, a name will be generated using the name_prefix and system_name. Default: ""
    name = "my-cdn"

    # (Optional) The prefix for the CloudFront distribution name. This is used to generate a name if the name variable is not provided. Default: ""
    name_prefix = "cdn"

    # (Required) Organization details for tagging and naming.
    org = {
      organization_name = "my-org"       # (Required) The name of the organization
      organization_unit = "my-unit"      # (Required) The unit within the organization
      environment_type  = "production"   # (Required) The type of environment (e.g. production, staging)
      environment_name  = "prod"         # (Required) The name of the environment
    }

    # (Optional) Is this a hub or spoke configuration? Default: false
    is_hub = false

    # (Optional) Spoke ID Number, must be a 3 digit number. Default: "001"
    spoke_def = "001"

    # (Optional) Extra tags to add to the resources. Default: {}
    extra_tags = {
      Project = "Phoenix"
    }

    # (Optional) ACM certificate ARN for the distribution. Default: ""
    acm_certificate_arn = "arn:aws:acm:us-east-1:123456789012:certificate/..."

    # (Required) CloudFront distribution settings for the project.
    settings = {
      default_origin = "main-origin"
      origins = {
        main-origin = {
          type = "s3"
          name = "my-web-content-bucket"
        }
      }
      default_cache_behavior = {
        managed_cache = "Managed-CachingOptimized"
      }
    }

    # (Optional) A map of CloudFront functions to be associated with the distribution. Default: {}
    functions = {
      my-func = {
        code = "function handler(event) { return event.request; }"
      }
    }
  }
  ```

  ### Variables Structure Documentation (YAML)

  ```yaml
  # Full configuration for all module variables
  name: "my-cdn"              # (Optional) The name of the CloudFront distribution. If not provided, a name will be generated using the name_prefix and system_name. Default: ""
  name_prefix: "cdn"          # (Optional) The prefix for the CloudFront distribution name. This is used to generate a name if the name variable is not provided. Default: ""
  org:                        # (Required) Organization details for tagging and naming.
    organization_name: "my-org"       # (Required) The name of the organization
    organization_unit: "my-unit"      # (Required) The unit within the organization
    environment_type: "production"   # (Required) The type of environment (e.g. production, staging)
    environment_name: "prod"         # (Required) The name of the environment
  is_hub: false               # (Optional) Is this a hub or spoke configuration? Default: false
  spoke_def: "001"            # (Optional) Spoke ID Number, must be a 3 digit number. Default: "001"
  extra_tags:                 # (Optional) Extra tags to add to the resources. Default: {}
    Project: "Phoenix"
  acm_certificate_arn: "arn:aws:acm:..." # (Optional) ACM certificate ARN for the distribution. Default: ""

  # Full configuration structure for 'settings' variable
  settings: # (Required) CloudFront distribution settings for the project.
    enabled: true # (Optional) Whether the distribution is enabled to accept end user requests for content. Default: true
    ipv6_enabled: false # (Optional) Whether IPv6 is enabled for the distribution. Default: false
    comment: "CloudFront distribution" # (Optional) Any comments you want to include about the distribution. Default: "CloudFront distribution for <name>"
    default_root_object: "index.html" # (Optional) The object that you want CloudFront to return when an end user requests the root URL. Default: "index.html"
    aliases: ["example.com"] # (Optional) Extra CNAMEs (alternate domain names), if any, for this distribution. Default: []
    default_origin: "my-origin" # (Required) The ID of the default origin for the distribution.
    origins: # (Required) Map of origins for the distribution.
      my-origin: # (Required) Unique identifier for the origin.
        type: "s3" # (Required) The type of origin. Possible values: s3, custom.
        name: "my-bucket" # (Required if type is s3) The name of the S3 bucket.
        domain_name: "example.com" # (Required if type is custom) The DNS domain name of the origin.
        origin_path: "/path" # (Optional) An optional element that causes CloudFront to request your content from a directory in your origin. Default: null
        origin_staging_path: "/stg-path" # (Optional) An optional element that causes CloudFront to request your content from a directory in your origin for staging. Default: null
        signing_behavior: "always" # (Optional) Specifies which requests CloudFront signs. Possible values: always, never, no-override. Default: "always"
        signing_protocol: "sigv4" # (Optional) The protocol to use for signing requests. Default: "sigv4"
    cert: # (Optional) Certificate settings for the distribution.
      cloudfront_default_certificate: true # (Optional) true if you want viewers to use HTTPS to request your objects and you're using the CloudFront domain name. Default: true (if acm_certificate_arn is not provided)
      minimum_protocol_version: "TLSv1.2_2025" # (Optional) The minimum version of the SSL protocol that you want CloudFront to use for HTTPS connections. Default: "TLSv1.2_2025"
      ssl_support_method: "sni-only" # (Optional) How you want CloudFront to serve HTTPS requests. Default: "sni-only"
    default_cache_behavior: # (Required) Default cache behavior settings.
      managed_cache: "Managed-CachingOptimized" # (Optional) The name of the managed cache policy to use. Default: "Managed-CachingOptimized"
      allowed_methods: ["GET", "HEAD"] # (Optional) Controls which HTTP methods CloudFront processes and forwards to your Amazon S3 bucket or your custom origin. Default: ["DELETE", "GET", "HEAD", "OPTIONS", "PATCH", "POST", "PUT"]
      cached_methods: ["GET", "HEAD"] # (Optional) Controls whether CloudFront caches the responses to requests using the specified HTTP methods. Default: ["GET", "HEAD"]
      target_origin_id: "my-origin" # (Optional) The value of ID for the origin that you want CloudFront to route requests to when a request matches the path pattern. Default: derived from default_origin
      viewer_protocol_policy: "redirect-to-https" # (Optional) Use this element to specify the protocol that users can use to access the files in the origin. Possible values: allow-all, https-only, redirect-to-https. Default: "redirect-to-https"
      min_ttl: 0 # (Optional) The minimum amount of time that you want objects to stay in CloudFront caches. Default: null
      default_ttl: 3600 # (Optional) The default amount of time that you want objects to stay in CloudFront caches. Default: null
      max_ttl: 86400 # (Optional) The maximum amount of time that you want objects to stay in CloudFront caches. Default: null
      compress: true # (Optional) Whether you want CloudFront to automatically compress certain files. Default: true
      functions: # (Optional) List of function associations for the default cache behavior.
        - ref: "my-func" # (Optional) Reference to a function defined in the functions variable.
          function_arn: "arn:aws:cloudfront::..." # (Optional) The ARN of the CloudFront function.
          event_type: "viewer-request" # (Required) The event type that triggers the function. Possible values: viewer-request, viewer-response.
    restrictions: # (Optional) Restrictions settings for the distribution.
      restriction_type: "none" # (Optional) The method that you want to use to restrict distribution of your content by country. Possible values: none, whitelist, blacklist. Default: "none"
      locations: ["US", "CA"] # (Optional) The ISO 3166-1-alpha-2 codes for which you want CloudFront either to distribute your content or not to distribute your content. Default: []
    staging: # (Optional) Staging distribution settings.
      create: false # (Optional) Whether to create a staging distribution. Default: false
      enabled: true # (Optional) Whether the staging distribution is enabled. Default: true
      header: # (Optional) Header configuration for traffic routing.
        name: "X-Staging" # (Required if header routing is used) The name of the header for traffic routing to staging.
        value: "true" # (Required if header routing is used) The value of the header for traffic routing to staging.
      weighted: # (Optional) Weighted traffic routing settings.
        traffic_percent: 10 # (Required if weighted routing is used) The percentage of traffic to route to the staging distribution. Default: 0
    weighted: # (Optional) Weighted traffic routing settings (legacy/alternative location).
      traffic_percent: 10 # (Required if using weighted routing) The percentage of traffic to route to the staging distribution. Default: 0
      session_stickiness: # (Optional) Session stickiness settings for weighted routing.
        enabled: false # (Optional) Whether session stickiness is enabled. Default: false
        idle_ttl: 300 # (Optional) The idle TTL for session stickiness in seconds. Default: 300
        maximum_ttl: 300 # (Optional) The maximum TTL for session stickiness in seconds. Default: 300

  # Full configuration structure for 'functions' variable
  functions: # (Optional) A map of CloudFront functions to be associated with the distribution.
    my-func: # (Required) Unique identifier for the function.
      comment: "My function" # (Optional) A comment for the function.
      runtime: "cloudfront-js-2.0" # (Optional) The runtime for the function. Possible values: cloudfront-js-1.0, cloudfront-js-2.0. Default: "cloudfront-js-2.0"
      publish: true # (Optional) Whether to publish the function. Default: true
      code: "function handler(event) { ... }" # (Required) The source code of the function.
  ```

# Example usage
examples: |-
  ### Complete Terragrunt Example with Continuous Deployment (Staging)

  This example demonstrates a complex setup including multiple origins, custom cache behaviors, and a staging distribution for safe testing of changes.

  ```hcl
  terraform {
    source = "github.com/cloudopsworks/terraform-module-aws-cloudfront-management?ref=v1.0.0"
  }

  inputs = {
    name_prefix = "myapp"
    org = {
      organization_name = "acme"
      organization_unit = "platform"
      environment_type  = "prod"
      environment_name  = "global"
    }
    settings = {
      default_origin = "app-api"
      origins = {
        app-api = {
          type = "custom"
          domain_name = "api.acme.com"
        }
        assets = {
          type = "s3"
          name = "acme-static-assets"
        }
      }
      default_cache_behavior = {
        managed_cache   = "Managed-CachingOptimized"
        allowed_methods = ["GET", "HEAD", "OPTIONS"]
        viewer_protocol_policy = "redirect-to-https"
        functions = [
          {
            ref = "security-headers"
            event_type = "viewer-response"
          }
        ]
      }
      staging = {
        create = true
        header = {
          name  = "X-Staging-Test"
          value = "enabled"
        }
      }
    }
    functions = {
      security-headers = {
        code = <<EOF
  function handler(event) {
      var response = event.response;
      var headers = response.headers;
      headers['x-frame-options'] = { value: 'DENY' };
      headers['x-content-type-options'] = { value: 'nosniff' };
      headers['strict-transport-security'] = { value: 'max-age=63072000; includeSubdomains; preload' };
      return response;
  }
  EOF
      }
    }
  }
  ```

# How to get started quickly
quickstart: |-
  1. **Initialization**: Ensure your environment is initialized for AWS by running `make init/aws`.
  2. **Configuration**: Create a `terragrunt.hcl` file and define the `org` and `settings` inputs.
  3. **Origins**: Map your S3 buckets or custom domains in the `origins` block. Ensure the `default_origin` key exists in the `origins` map.
  4. **Deployment**: Run `terragrunt plan` to verify the configuration and `terragrunt apply` to create the CloudFront distribution.
  5. **Verification**: Once deployed, use the `distribution_domain_name` output to access your content.

